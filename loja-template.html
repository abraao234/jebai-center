<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --yellow:#F5C800; --green:#3DAA6B; --green-dark:#2e8e58;
  --dark:#222; --gray:#555; --light-gray:#f5f5f5; --border:#e0e0e0;
  --primary:#7d3c98; /* sobrescrito por JS com a cor da loja */
  --primary-dark:#5e2d75;
}
body { font-family:'Open Sans',sans-serif; color:var(--dark); background:#fff; font-size:14px; }
a { text-decoration:none; color:inherit; }
img { max-width:100%; display:block; }

/* HEADER */
header { background:#fff; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; box-shadow:0 1px 4px rgba(0,0,0,0.08); }
.header-inner { max-width:1200px; margin:0 auto; padding:12px 20px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
.brand-link { display:flex; align-items:center; gap:10px; font-family:'Montserrat',sans-serif; font-weight:900; font-size:14px; color:var(--dark); }
.brand-mark { width:32px; height:32px; background:var(--yellow); border-radius:10px; display:grid; place-items:center; font-weight:900; }
.back-btn { display:inline-flex; align-items:center; gap:8px; background:var(--light-gray); border:1px solid var(--border); color:var(--dark); font-family:'Montserrat',sans-serif; font-weight:700; font-size:12px; padding:8px 16px; border-radius:999px; }
.back-btn:hover { background:var(--border); }

/* HERO */
.store-hero { background:var(--primary); padding:60px 20px; position:relative; overflow:hidden; }
.store-hero::before { content:''; position:absolute; right:-100px; top:-80px; width:400px; height:400px; border-radius:50%; background:rgba(255,255,255,0.07); }
.store-hero::after { content:''; position:absolute; left:-50px; bottom:-100px; width:280px; height:280px; border-radius:50%; background:rgba(255,255,255,0.05); }
.store-hero-inner { max-width:1200px; margin:0 auto; position:relative; z-index:2; }
.breadcrumb { display:flex; align-items:center; gap:8px; margin-bottom:24px; font-size:12px; color:rgba(255,255,255,0.75); font-family:'Montserrat',sans-serif; }
.breadcrumb a:hover { color:#fff; }
.breadcrumb span.sep { color:rgba(255,255,255,0.4); }
.store-hero-content { display:flex; align-items:center; gap:36px; flex-wrap:wrap; }
.store-logo-big { width:120px; height:120px; background:#fff; border-radius:24px; display:grid; place-items:center; flex-shrink:0; overflow:hidden; box-shadow:0 12px 32px rgba(0,0,0,0.18); }
.store-logo-big img { width:100%; height:100%; object-fit:cover; }
.store-logo-fallback { font-family:'Montserrat',sans-serif; font-weight:900; font-size:36px; color:var(--primary); }
.store-hero-info { flex:1; min-width:260px; }
.store-hero-info h1 { font-family:'Montserrat',sans-serif; font-weight:900; font-size:38px; color:#fff; text-shadow:0 2px 12px rgba(0,0,0,0.18); margin-bottom:10px; line-height:1.1; }
.store-hero-info p { color:rgba(255,255,255,0.92); font-size:15px; line-height:1.6; max-width:560px; margin-bottom:18px; }
.store-tags { display:flex; flex-wrap:wrap; gap:8px; }
.tag { background:rgba(255,255,255,0.18); color:#fff; font-family:'Montserrat',sans-serif; font-weight:700; font-size:11px; padding:6px 14px; border-radius:999px; border:1px solid rgba(255,255,255,0.28); display:inline-flex; align-items:center; gap:6px; }
.tag svg { width:12px; height:12px; }

/* BANNER (opcional, se houver banner_url) */
.store-banner { max-width:1200px; margin:24px auto 0; padding:0 20px; }
.store-banner img { width:100%; max-height:280px; object-fit:cover; border-radius:18px; box-shadow:0 16px 40px rgba(0,0,0,0.12); }

/* SECTION */
.section { padding:48px 0; }
.section.bg-gray { background:var(--light-gray); }
.section-inner { max-width:1200px; margin:0 auto; padding:0 20px; }
.section-title { font-family:'Montserrat',sans-serif; font-weight:800; font-size:24px; color:var(--dark); margin-bottom:28px; display:flex; align-items:center; gap:12px; }
.section-title::after { content:''; flex:1; height:2px; background:var(--border); border-radius:2px; }
.section-title em { color:var(--primary); font-style:normal; }

/* PRODUCTS */
.products-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:18px; }
.product-card { border:1px solid var(--border); border-radius:14px; overflow:hidden; background:#fff; transition:.18s; display:flex; flex-direction:column; }
.product-card:hover { box-shadow:0 12px 30px rgba(0,0,0,0.10); transform:translateY(-3px); }
.product-img { aspect-ratio:1/1; display:grid; place-items:center; background:#fafafa; overflow:hidden; }
.product-img img { width:100%; height:100%; object-fit:cover; }
.product-img-fallback { color:var(--border); font-size:48px; }
.product-info { padding:16px; flex:1; display:flex; flex-direction:column; }
.product-name { font-family:'Montserrat',sans-serif; font-weight:700; font-size:14px; color:var(--dark); margin-bottom:6px; line-height:1.4; }
.product-desc { font-size:12px; color:var(--gray); margin-bottom:12px; line-height:1.5; flex:1; }
.product-price { font-family:'Montserrat',sans-serif; font-weight:900; font-size:20px; color:var(--primary); margin-bottom:12px; }
.btn-buy { display:block; width:100%; text-align:center; background:var(--green); color:#fff; font-family:'Montserrat',sans-serif; font-weight:800; font-size:13px; padding:11px; border-radius:10px; transition:background .18s; }
.btn-buy:hover { background:var(--green-dark); }

/* INFO */
.info-grid { display:grid; grid-template-columns:1fr 1fr; gap:24px; }
.info-card { background:#fff; border:1px solid var(--border); border-radius:18px; padding:28px; }
.info-card h3 { font-family:'Montserrat',sans-serif; font-weight:800; font-size:17px; color:var(--dark); margin-bottom:18px; display:flex; align-items:center; gap:12px; }
.info-card h3 .icon-circle { width:38px; height:38px; background:var(--primary); border-radius:50%; display:grid; place-items:center; flex-shrink:0; color:#fff; }
.info-list { list-style:none; padding:0; }
.info-list li { padding:10px 0; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; font-size:14px; color:var(--dark); }
.info-list li:last-child { border-bottom:none; }
.info-list li .lbl { color:var(--gray); font-size:12px; min-width:90px; font-family:'Montserrat',sans-serif; font-weight:700; text-transform:uppercase; letter-spacing:.4px; }

/* CTA */
.cta-section { background:var(--primary); padding:64px 20px; text-align:center; color:#fff; }
.cta-section h2 { font-family:'Montserrat',sans-serif; font-weight:900; font-size:30px; margin-bottom:12px; }
.cta-section p { color:rgba(255,255,255,0.92); margin:0 auto 28px; max-width:560px; line-height:1.6; }
.cta-btns { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
.btn-whatsapp, .btn-white { display:inline-flex; align-items:center; gap:8px; font-family:'Montserrat',sans-serif; font-weight:800; font-size:14px; padding:13px 28px; border-radius:10px; transition:.18s; }
.btn-whatsapp { background:#25D366; color:#fff; }
.btn-whatsapp:hover { opacity:0.9; transform:translateY(-1px); }
.btn-white { background:rgba(255,255,255,0.16); color:#fff; border:1px solid rgba(255,255,255,0.4); }
.btn-white:hover { background:rgba(255,255,255,0.28); }

/* EMPTY */
.empty-state { text-align:center; padding:60px 20px; color:var(--gray); }
.empty-state h3 { font-family:'Montserrat',sans-serif; margin-bottom:8px; color:var(--dark); }

/* DRAFT BANNER */
.draft-banner { background:#fff8db; border-bottom:1px solid #ffe58a; color:#6a5300; padding:10px 20px; text-align:center; font-size:13px; font-weight:700; }
.draft-banner strong { color:#5a4400; }

/* FOOTER */
footer { background:#1a1a1a; color:rgba(255,255,255,0.7); padding:36px 20px 20px; text-align:center; }
.footer-inner { max-width:1200px; margin:0 auto; }
.footer-brand { font-family:'Montserrat',sans-serif; font-weight:800; font-size:13px; letter-spacing:1px; color:#fff; }
.footer-bottom { margin-top:18px; font-size:11px; color:rgba(255,255,255,0.4); }

/* LOADING / NOT FOUND */
.center-msg { min-height:60vh; display:grid; place-items:center; padding:40px 20px; text-align:center; }
.center-msg h1 { font-family:'Montserrat',sans-serif; font-size:32px; margin-bottom:12px; }
.center-msg p { color:var(--gray); max-width:480px; margin:0 auto 20px; line-height:1.6; }

@media (max-width:900px) {
  .products-grid { grid-template-columns:repeat(2,1fr); }
  .info-grid { grid-template-columns:1fr; }
  .store-hero-info h1 { font-size:30px; }
}
@media (max-width:520px) {
  .products-grid { grid-template-columns:1fr; }
  .store-hero { padding:40px 18px; }
  .store-hero-info h1 { font-size:24px; }
}
</style>
